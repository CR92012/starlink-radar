<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Starlink Radar PRO</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="https://unpkg.com/satellite.js/dist/satellite.min.js"></script>
    <script src="config.js"></script>

    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            font-family: monospace;
            z-index: 1000;
        }

        #alert {
            position: absolute;
            top: 80px;
            left: 10px;
            background: rgba(200,0,0,0.8);
            color: white;
            padding: 8px;
            font-family: monospace;
            z-index: 1000;
            display: none;
        }

        #copyright {
            position: absolute;
            bottom: 5px;
            right: 10px;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="info">Iniciando...</div>
<div id="alert">⚠️ Tormenta fuerte detectada</div>
<div id="copyright">© 2026 - 2030 Hecho por Carlos Rodriguez</div>

<script>
// 🔊 sonido bip
function playBeep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.frequency.setValueAtTime(1000, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(() => osc.stop(), 120);
}

// 🌍 mapa
const map = L.map('map').setView([0,0], 3);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker;
let sats = [];

let satMarkers = [];
let beams = [];

let currentSatId = null;

let weatherImpact = 1;
let stormAlert = false;

// 📍 ubicación
navigator.geolocation.getCurrentPosition(async pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    map.setView([lat, lon], 6);

    userMarker = L.circleMarker([lat, lon], {
        radius: 6,
        color: "white"
    }).addTo(map);

    checkWeather(lat, lon);
});

// 🌩️ clima
async function checkWeather(lat, lon) {
    try {
        let res = await fetch(
            `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${CONFIG.WEATHER_API_KEY}`
        );
        let data = await res.json();

        let rain = data.list?.[0]?.pop || 0;

        weatherImpact = 1 - (rain * 0.5);
        stormAlert = rain > 0.7;

        document.getElementById("alert").style.display =
            stormAlert ? "block" : "none";

    } catch {
        weatherImpact = 1;
    }
}

// 🛰️ TLE
async function loadTLE() {
    let res = await fetch("https://celestrak.org/NORAD/elements/starlink.txt");
    return (await res.text()).split("\n");
}

function parseTLE(lines) {
    let max = 60;

    for (let i = 0; i < lines.length && sats.length < max; i += 3) {
        try {
            if (!lines[i+1] || !lines[i+2]) continue;

            sats.push({
                name: lines[i],
                satrec: satellite.twoline2satrec(lines[i+1], lines[i+2])
            });
        } catch {}
    }
}

// 🛰️ posición
function getPos(satrec, time) {
    try {
        let pv = satellite.propagate(satrec, time);
        if (!pv.position) return null;

        let gmst = satellite.gstime(time);
        let geo = satellite.eciToGeodetic(pv.position, gmst);

        let lat = satellite.degreesLat(geo.latitude);
        let lon = satellite.degreesLong(geo.longitude);

        if (!isFinite(lat) || !isFinite(lon)) return null;

        return { lat, lon };

    } catch {
        return null;
    }
}

// 🔮 predicción
function willPass(sat, userLatLng) {
    let now = new Date();

    for (let i = 1; i <= 20; i++) {
        let t = new Date(now.getTime() + i * 60000);
        let p = getPos(sat.satrec, t);
        if (!p) continue;

        let dist = map.distance(userLatLng, [p.lat, p.lon]) / 1000;

        if (dist < 1500) return i;
    }

    return null;
}

// 📡 señal
function calcSignal(dist) {
    let max = 1500;
    let s = 1 - (dist / max);
    return Math.max(0, s) * weatherImpact;
}

// 📶 ping
function calcPing(dist, signal) {
    return Math.round(dist * 2 + Math.random()*20 + (1-signal)*100);
}

// 🚀 update optimizado
function update() {
    if (!userMarker) return;

    let now = new Date();
    let userLatLng = userMarker.getLatLng();

    satMarkers.forEach(m => map.removeLayer(m));
    beams.forEach(b => map.removeLayer(b));

    satMarkers = [];
    beams = [];

    let bestSat = null;
    let bestSignal = 0;
    let bestPing = 0;

    let nextSat = null;
    let nextTime = 999;

    sats.forEach((s, index) => {
        let p = getPos(s.satrec, now);
        if (!p) return;

        let dist = map.distance(userLatLng, [p.lat, p.lon]) / 1000;
        let signal = calcSignal(dist);

        // actual
        if (dist < 1500 && signal > bestSignal) {
            bestSignal = signal;
            bestSat = { id: index, pos: p, dist };
        }

        // futuro
        let future = willPass(s, userLatLng);
        if (future !== null && future < nextTime) {
            nextTime = future;
            nextSat = s;
        }
    });

    // 🟢 SAT ACTUAL
    if (bestSat) {
        let ping = calcPing(bestSat.dist, bestSignal);

        let marker = L.circleMarker([bestSat.pos.lat, bestSat.pos.lon], {
            radius: 7,
            color: "cyan"
        }).addTo(map);

        let beam = L.circle([bestSat.pos.lat, bestSat.pos.lon], {
            radius: 200000 * bestSignal,
            color: "blue",
            fillOpacity: 0.15
        }).addTo(map);

        satMarkers.push(marker);
        beams.push(beam);

        // 🔊 cambio real
        if (currentSatId !== bestSat.id) {
            currentSatId = bestSat.id;
            playBeep();
        }

        bestPing = ping;
    }

    // 🔮 SAT FUTURO
    if (nextSat) {
        let futurePos = getPos(
            nextSat.satrec,
            new Date(Date.now() + nextTime * 60000)
        );

        if (futurePos) {
            let marker = L.circleMarker([futurePos.lat, futurePos.lon], {
                radius: 5,
                color: "gray"
            }).addTo(map);

            satMarkers.push(marker);
        }
    }

    document.getElementById("info").innerText =
        "🌐 Starlink Radar PRO\n" +
        (stormAlert ? "⚠️ TORMENTA\n" : "") +
        "Ping: " + bestPing + " ms\n" +
        "Señal: " + Math.round(bestSignal*100) + "%\n" +
        (nextSat ? `Próximo en: ${nextTime} min` : "");
}

// 🚀 init
(async () => {
    let tle = await loadTLE();
    parseTLE(tle);

    setInterval(update, 5000);

    setInterval(() => {
        if (userMarker) {
            let pos = userMarker.getLatLng();
            checkWeather(pos.lat, pos.lng);
        }
    }, 60000);

    update();
})();
</script>

</body>
</html>
