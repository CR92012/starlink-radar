<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Starlink Radar FIX</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Satellite -->
<script src="https://unpkg.com/satellite.js@5.0.1/dist/satellite.min.js"></script>

<script src="config.js"></script>

<style>
html, body {
    height: 100%;
    margin: 0;
}
#map {
    height: 100vh;
}
#info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: black;
    color: lime;
    padding: 10px;
    z-index: 1000;
    font-family: monospace;
}
</style>
</head>
<body>

<div id="map"></div>
<div id="info">Cargando...</div>

<script>
// 🔍 DEBUG
console.log("Leaflet:", typeof L);
console.log("Satellite:", typeof satellite);

// 🚨 SI FALLA LIBRERÍA
if (typeof L === "undefined") {
    alert("Leaflet NO cargó");
}
if (typeof satellite === "undefined") {
    alert("Satellite.js NO cargó");
}

// 🌍 MAPA
const map = L.map('map').setView([-31.4, -64.2], 5);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// 📍 marcador usuario
let userLatLng = [-31.4, -64.2];
L.circleMarker(userLatLng, {
    radius: 6,
    color: "white"
}).addTo(map);

// 🛰️ prueba simple (SI ESTO NO APARECE → el problema es JS)
L.circleMarker([-30, -60], {
    radius: 6,
    color: "red"
}).addTo(map).bindPopup("SAT TEST");

// 🛰️ TLE
async function loadTLE() {
    try {
        let res = await fetch("https://celestrak.org/NORAD/elements/starlink.txt");
        let text = await res.text();

        console.log("TLE cargado");
        return text.split("\n");

    } catch (e) {
        console.error("Error TLE", e);
        return [];
    }
}

let satrecList = [];

function parseTLE(lines) {
    for (let i = 0; i < lines.length; i += 3) {
        try {
            if (!lines[i+1] || !lines[i+2]) continue;

            satrecList.push(
                satellite.twoline2satrec(lines[i+1], lines[i+2])
            );

            if (satrecList.length > 10) break;

        } catch (e) {
            console.warn("TLE error", e);
        }
    }
}

// 🛰️ POSICIÓN
function getPos(satrec) {
    try {
        let time = new Date();
        let pv = satellite.propagate(satrec, time);

        if (!pv.position) return null;

        let gmst = satellite.gstime(time);
        let geo = satellite.eciToGeodetic(pv.position, gmst);

        return [
            satellite.degreesLat(geo.latitude),
            satellite.degreesLong(geo.longitude)
        ];

    } catch {
        return null;
    }
}

// 🚀 UPDATE SIMPLE
function update() {
    document.getElementById("info").innerText = "Satélites: " + satrecList.length;

    satrecList.forEach(s => {
        let p = getPos(s);
        if (!p) return;

        L.circleMarker(p, {
            radius: 3,
            color: "cyan"
        }).addTo(map);
    });
}

// 🚀 INIT
(async () => {
    let tle = await loadTLE();
    parseTLE(tle);

    console.log("Satélites:", satrecList.length);

    setInterval(update, 5000);
})();
</script>

</body>
</html>
